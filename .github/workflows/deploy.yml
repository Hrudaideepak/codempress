name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Execute Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio anyio

      - name: Seed Database Skeleton
        run: python content/seed_topics.py

      - name: Run E2E Test Suite
        env:
          PYTHONPATH: .
        run: python -m pytest -k "not test_frontend_rendering"

  build-containers:
    name: Build & Verify Containers compilation
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Container
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false

      - name: Build Frontend Container
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false

  build-android-apk:
    name: Build Android APK Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Web Bundle & Sync Capacitor Android
        run: |
          cd frontend
          npm install
          npm run build
          npx @capacitor/cli sync android

      - name: Build Android APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codempress-android-app
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
